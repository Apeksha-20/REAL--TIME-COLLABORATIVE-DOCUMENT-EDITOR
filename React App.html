body{
  background-image:
  linear-gradient(rgba(20,20,40,0.65), rgba(20,20,40,0.65)),
  url("https://images.unsplash.com/photo-1517842645767-c639042777db");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  font-family: 'Segoe UI', sans-serif;
  margin:0;
}

/* MAIN CONTAINER */
.editor-wrapper{
  width:950px;
  margin:auto;
  text-align:center;
  padding-top:50px;
  color:white;
}

/* TITLE */
h1{
  margin-bottom:25px;
  font-size:36px;
  letter-spacing:1px;
  text-shadow:0 3px 8px rgba(0,0,0,0.4);
}

/* TOOLBAR */
.toolbar{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);

  padding:12px;
  border-radius:12px;

  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;

  margin-bottom:25px;

  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* BUTTON STYLE */
button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  cursor:pointer;

  font-size:18px;
  font-weight:600;

  background:#f1f1f1;
  color:#333;

  transition:all 0.25s ease;
}

/* BUTTON HOVER */
button:hover{
  background:#4b6cff;
  color:white;
  transform:translateY(-2px);
  box-shadow:0 4px 10px rgba(0,0,0,0.25);
}

/* BUTTON CLICK */
button:active{
  transform:scale(0.95);
}

/* TOOLBAR DIVIDER */
.toolbar-divider{
  width:1px;
  height:28px;
  background:#ccc;
  margin:0 6px;
}

/* DOCUMENT PAGE STYLE */
.editor{
  width:850px;
  min-height:520px;

  margin:auto;

  background:white;

  border-radius:6px;

  padding:50px;

  font-size:18px;
  line-height:1.7;

  color:#333;

  outline:none;

  text-align:left;

  box-shadow:
  0 12px 30px rgba(0,0,0,0.35);
}

/* WORD COUNTER */
.word-count{
  margin-top:15px;
  font-weight:bold;
  font-size:18px;
  letter-spacing:0.5px;
}

/* RESPONSIVE DESIGN */
@media (max-width:900px){

  .editor-wrapper{
    width:95%;
  }

  .editor{
    width:100%;
    padding:30px;
  }

}
